<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="/src/images/logo.png" type="image/x-icon">
    <title>Login</title>
    <link rel="stylesheet" href="/dist/css/output.css">
    <link rel="stylesheet" href="/src/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.2.0/flowbite.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            lucide.createIcons();
        });
    </script>
</head>

<body class="font-Manrope">
    <div class="min-h-screen flex items-center justify-center relative text-black bg_huge px-4 md:px-6 lg:px-8">

        <!-- Grid Overlay -->
        <div class="grid-overlay absolute inset-0 z-0"></div>

        <!-- Centered Login Container -->
        <div class="w-full max-w-md md:max-w-lg lg:max-w-md relative z-20">

            <!-- Logo -->
            <div class="flex justify-center mb-6">
                <div class="w-24 md:w-24 md:h-24 flex items-center justify-center">
                    <img src="../images/logo.png" alt="Logo" class="w-full h-full object-contain" />
                </div>
            </div>

            <!-- Login Card -->
            <div class="bg-gray-200 p-6 md:p-8 rounded-2xl shadow-2xl">

                <!-- Heading -->
                <div class="text-center mb-6 md:mb-8">
                    <h2 class="text-xl md:text-2xl font-bold mb-1">Login</h2>
                    <p class="text-sm md:text-base">Provide the correct login details.</p>
                </div>

                <form>

                    <!-- Email Field -->
                    <div class="mb-6 md:mb-8">
                        <label for="email" class="block text-sm font-semibold mb-2">Email</label>
                        <div class="flex items-center border border-gray-400 rounded-lg bg-white overflow-hidden">
                            <div class="px-3 text-green-700">
                                <!-- Email Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"
                                    class="w-4 h-4">
                                    <path
                                        d="M1.5 8.67v8.58a3 3 0 0 0 3 3h15a3 3 0 0 0 3-3V8.67l-8.928 5.493a3 3 0 0 1-3.144 0L1.5 8.67Z" />
                                    <path
                                        d="M22.5 6.908V6.75a3 3 0 0 0-3-3h-15a3 3 0 0 0-3 3v.158l9.714 5.978a1.5 1.5 0 0 0 1.572 0L22.5 6.908Z" />
                                </svg>
                            </div>
                            <input id="email" type="email" placeholder="you@example.com"
                                value="jamesmajekodunmi@gmail.com"
                                class="w-full px-3 py-3 text-xs md:text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-green-700" />

                        </div>
                    </div>

                    <!-- Password Field -->
                    <div class="mb-8 md:mb-12">
                        <label for="password" class="block text-sm font-semibold mb-2">Password</label>
                        <div class="flex items-center border border-gray-400 rounded-lg bg-white overflow-hidden">
                            <div class="px-3 text-green-700">
                                <!-- Lock Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"
                                    class="w-4 h-4">
                                    <path fill-rule="evenodd"
                                        d="M12 1.5a5.25 5.25 0 0 0-5.25 5.25v3a3 3 0 0 0-3 3v6.75a3 3 0 0 0 3 3h10.5a3 3 0 0 0 3-3v-6.75a3 3 0 0 0-3-3v-3c0-2.9-2.35-5.25-5.25-5.25Zm3.75 8.25v-3a3.75 3.75 0 1 0-7.5 0v3h7.5Z"
                                        clip-rule="evenodd" />
                                </svg>
                            </div>
                            
                            <input id="password" type="password" placeholder="********"
                                class="w-full px-3 py-3 text-xs md:text-sm border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-green-700 focus:border-green-700" />

                            <div class="px-3 text-green-700">
                                <!-- Eye Slash Icon -->
                                <svg xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24"
                                    class="w-4 h-4">
                                    <path
                                        d="M3.53 2.47a.75.75 0 0 0-1.06 1.06l18 18a.75.75 0 1 0 1.06-1.06l-18-18ZM22.676 12.553a11.249 11.249 0 0 1-2.631 4.31l-3.099-3.099a5.25 5.25 0 0 0-6.71-6.71L7.759 4.577a11.217 11.217 0 0 1 4.242-.827c4.97 0 9.185 3.223 10.675 7.69.12.362.12.752 0 1.113Z" />
                                    <path
                                        d="M15.75 12c0 .18-.013.357-.037.53l-4.244-4.243A3.75 3.75 0 0 1 15.75 12ZM12.53 15.713l-4.243-4.244a3.75 3.75 0 0 0 4.244 4.243Z" />
                                    <path
                                        d="M6.75 12c0-.619.107-1.213.304-1.764l-3.1-3.1a11.25 11.25 0 0 0-2.63 4.31c-.12.362-.12.752 0 1.114 1.489 4.467 5.704 7.69 10.675 7.69 1.5 0 2.933-.294 4.242-.827l-2.477-2.477A5.25 5.25 0 0 1 6.75 12Z" />
                                </svg>
                            </div>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="flex items-center justify-center">
                        <a href="dashboard.html"
                            class="w-2/3 sm:w-3/4 text-center px-6 py-2.5 text-white text-sm font-semibold rounded-md shadow-lg bg-gradient-to-br from-green-600 to-green-800">
                            Log into your Account
                        </a>
                    </div>

                </form>
            </div>
        </div>
    </div>

</body>

</html>
